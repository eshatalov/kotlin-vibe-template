spring:
  application:
    name: Template
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    schemas: template
    create-schemas: true
  # R2DBC and DataSource URLs are provided by TestDatabaseConfig

app:
  redis:
    streams:
      test-table:
        enabled: false
        key: template:test-table-events
        poll-timeout: 1s
